# Install input and runtime configuration for one existing Ubuntu 24.04 VM.
version = 1

[backend]
kind = "static_ssh"
host = "work-vm"
identity_file = "~/.ssh/work-vm"
known_hosts_file = "~/.ssh/work-vm-known-hosts"

[git]
identity_file = "~/.ssh/id_ed25519"
known_hosts_file = "~/.ssh/known_hosts"

[guest]
session = "byobu"
disk_gib = 32
ssh_authorized_keys_file = "~/.ssh/id_ed25519.pub"

[install]
binary_dir = "/usr/local/bin"
